name: deploy-njgn1k

# POKER referee → the aiwars-njgn1k deployment. Adapted from the generic minigame deploy
# (stormfall's pattern): a single hardcoded deployment, an ubuntu-latest runner (the MLWars
# self-hosted runner is retired), a per-deployment concurrency guard, and a push trigger on the
# referee-push branch. Builds the referee image + pushes it to that deployment's per-deployment
# ECR repo `aiwars/aiwars-njgn1k/mcp` (what its World-Manager reads as MCP_IMAGE), then publishes
# game.toml + [media] art to the recorded-views bucket (royale's publish step, verbatim).
on:
  push:
    branches: [claude/njgn1k-referee-push]
  workflow_dispatch:

# One in-flight deploy to this deployment at a time; never cancel a half-finished image push.
concurrency:
  group: deploy-njgn1k-poker
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  DEPLOYMENT: aiwars-njgn1k

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read game manifest
        id: game
        run: |
          set -euo pipefail
          {
            python3 - <<'PY'
          import tomllib
          g = tomllib.load(open("game.toml", "rb")).get("game", {})
          print(f"name={g['name']}")
          print("labels<<LBL")
          for k, v in g.items():
              print(f"org.aiwars.game.{k}={v}")
          print("LBL")
          PY
          } >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Resolve the deployment's ECR repo + log in
        id: ecr
        run: |
          set -euo pipefail
          ACCOUNT="$(aws sts get-caller-identity --query Account --output text)"
          REGISTRY="${ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          REPO_NAME="aiwars/${DEPLOYMENT}/mcp"
          # Provisioned by the deployment's terraform; create-if-missing keeps this robust.
          aws ecr describe-repositories --repository-names "$REPO_NAME" >/dev/null 2>&1 \
            || aws ecr create-repository --repository-name "$REPO_NAME" >/dev/null
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$REGISTRY"
          echo "repo=${REGISTRY}/${REPO_NAME}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build + push the referee image to the deployment's ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.ecr.outputs.repo }}:${{ steps.game.outputs.name }}
            ${{ steps.ecr.outputs.repo }}:${{ steps.game.outputs.name }}-${{ github.sha }}
            ${{ steps.ecr.outputs.repo }}:latest
          labels: ${{ steps.game.outputs.labels }}
          secrets: |
            gh_token=${{ secrets.AIWARS_DEP_TOKEN }}

      - name: Publish game.toml + [media] art to the recorded-views bucket
        run: |
          set -euo pipefail
          # Demo + media publish rail (#317): the platform's world-manager aggregates
          # s3://aiwars-<deployment>-recorded-views/games/<name>/game.toml into
          # GET /games/manifests, and the view-gateway serves the media keys published
          # beside it — so the site knows this game's demo flag AND its card art
          # pre-world. Mirrors the platform repo's grafted publish step exactly.
          NAME='${{ steps.game.outputs.name }}'
          BUCKET="aiwars-${DEPLOYMENT}-recorded-views"
          aws s3 cp game.toml "s3://${BUCKET}/games/${NAME}/game.toml" --content-type application/toml
          echo "published game.toml → s3://${BUCKET}/games/${NAME}/game.toml"
          publish_media() {
            local field="$1" kind="$2" rel ext ct
            rel="$(sed -nE "s/^[[:space:]]*${field}[[:space:]]*=[[:space:]]*\"([^\"]+)\".*/\1/p" game.toml | head -n1)"
            [ -n "$rel" ] || return 0   # undeclared — nothing to publish
            if [ ! -f "$rel" ]; then
              echo "::warning::game.toml declares [media] ${field}=\"${rel}\" but the file is missing — SKIPPING (never fabricated)"
              return 0
            fi
            ext="$(printf '%s' "${rel##*.}" | tr '[:upper:]' '[:lower:]')"
            case "$ext" in
              gif) ct=image/gif ;;
              png) ct=image/png ;;
              webp) ct=image/webp ;;
              jpg|jpeg) ct=image/jpeg ;;
              *) echo "::warning::unrecognized [media] extension .${ext} on ${rel} — SKIPPING"; return 0 ;;
            esac
            aws s3 cp "$rel" "s3://${BUCKET}/games/${NAME}/${kind}" --content-type "$ct"
            echo "published ${rel} → s3://${BUCKET}/games/${NAME}/${kind} (${ct})"
          }
          publish_media thumbnail thumb
          publish_media cover cover

      - run: |
          echo "Deployed **${{ steps.game.outputs.name }}** referee → \`${{ steps.ecr.outputs.repo }}\` (tags: \`${{ steps.game.outputs.name }}\`, \`latest\`) for deployment **${DEPLOYMENT}**." >> "$GITHUB_STEP_SUMMARY"
