name: ci

# GENERIC AIWars minigame CI — game-agnostic; copy verbatim into any game repo. The image name
# is derived from the repo, and the image labels are read from game.toml. The only repo-specific
# inputs are the `AIWARS_DEP_TOKEN` secret (read access to the private AIWars lib) and game.toml.
# NB: runs-on is ubuntu-latest — the MLWars self-hosted (aiwars-ec2) runner is retired.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          components: clippy, rustfmt
      # aiwars-minigame is a git-dep on the PRIVATE AsafFisher/AIWars repo.
      - name: Auth git for the private aiwars-minigame dep
        run: git config --global url."https://x-access-token:${{ secrets.AIWARS_DEP_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  image:
    runs-on: ubuntu-latest
    needs: rust
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Derive image name + game labels (from the repo + game.toml)
        id: meta
        run: |
          set -euo pipefail
          echo "image=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          {
            echo "labels<<EOF"
            python3 - <<'PY'
          import tomllib
          g = tomllib.load(open("game.toml", "rb")).get("game", {})
          for k, v in g.items():
              print(f"org.aiwars.game.{k}={v}")
          PY
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build (+ push on main) the referee image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }} # build-only on PRs; push on main
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          secrets: |
            gh_token=${{ secrets.AIWARS_DEP_TOKEN }}
